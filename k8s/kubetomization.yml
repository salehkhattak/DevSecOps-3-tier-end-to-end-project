apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace to deploy all resources
namespace: notes-app

# All resources to include
resources:
  # Root level resources
  - namespace.yaml
  - pv.yaml
  - ingress.yaml
  - hpa.yaml
  
  # MySQL resources
  - mysql-k8s/mysql-configmap.yaml
  - mysql-k8s/mysql-secret.yaml
  - mysql-k8s/mysql-pvc.yaml
  - mysql-k8s/mysql-deployment.yaml
  - mysql-k8s/mysql-service.yaml
  
  # Backend resources
  - backend-k8s/backend-configmap.yaml
  - backend-k8s/backend-secret.yaml
  - backend-k8s/backend-deployment.yaml
  - backend-k8s/backend-service.yaml
  
  # Frontend resources
  - frontend-k8s/frontend-configmap.yaml
  - frontend-k8s/frontend-deployment.yaml
  - frontend-k8s/frontend-service.yaml