apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: notes-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: salehktk005/notes-app-backend:1.1

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-configmap
              key: DB_HOST

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-configmap
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: backend-configmap
              key: DB_USER

        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: backend-configmap
              key: NODE_ENV

        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-configmap
              key: PORT

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_SECRET

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DB_PASSWORD

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"

          limits:
            memory: "128Mi"
            cpu: "500m"
